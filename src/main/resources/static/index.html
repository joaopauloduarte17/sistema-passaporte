<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Passaporte - Usuários</title>
    <!-- Materialize CSS -->
    <link rel="stylesheet" href="css/materialize.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="row" id="botao-top">
        <a href="loginUsuario.html" type="submit" class="btn">Cadastro Perfil Passaporte</a>
    </div>
    <div class="container">
        <div class="row">
            <div class="col s12">
                <h4>Cadastro de Usuários</h4>
            </div>
        </div>
        <form id="frmUsuario">
            <div class="row">
                    <div class="row">
                        <div class="input-field col s8">
                            <input id="nome" type="text" class="validate">
                            <label for="nome">Nome</label>
                        </div>
                        <div class="input-field col s4">
                            <input id="cpf" type="text" class="validate">
                            <label for="cpf">CPF (Apenas números)</label>
                        </div>
                    </div>
                    <div class="row">
                        <div class="input-field col s8">
                            <input id="email" type="email" class="validate">
                            <label for="email">E-mail</label>
                        </div>
                        <div class="input-field col s4">
                            <select id="tipoUsuario" name="tipoUsuario">
                                <option value="" disabled selected>Selecionar Tipo</option>
                                <option value="RH">RH</option>
                                <option value="GERENTE">GERENTE</option>
                                <option value="MEDICO_TRABALHO">MEDICO DO TRABALHO</option>
                                <option value="SEGURANCA_TRABALHO">SEGURANÇA DO TRABALHO</option>
                                <option value="CANDIDATO">CANDIDATO</option>
                            </select>
                            <label>Tipo de Usuário</label>
                        </div>
                    </div>
                    <div class="row">
                        <div class="input-field col s12">
                            <input id="senha" type="password" class="validate">
                            <label for="senha">Senha</label>
                        </div>
                    </div>
                    <div class="container-botao">
                        <button type="submit" class="btn">Cadastrar</button>
                    </div>
            </div>
        </form>
    </div>

    <!-- JQuery -->
    <script src="js/jquery-4.0.0.min.js"></script>

    <!-- Materialize JS -->
    <script src="js/materialize.min.js"></script>

    <script src="js/app.js"></script>

    <script src="js/jsusuario.js"></script>



</body>

</html>
